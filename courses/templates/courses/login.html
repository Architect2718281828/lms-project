{% extends "base.html" %}

{% block content %}
  <h2>Вход в систему</h2>

  <!-- Если пользователь ввел неверный пароль, покажем ошибку -->
  {% if form.errors %}
    <p style="color: red;">Логин или пароль введены неверно. Попробуйте еще раз.</p>
  {% endif %}

  <!-- Форма авторизации -->
  <form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    
    <div>
      {{ form.username.label_tag }}
      {{ form.username }}
    </div>
    
    <div style="margin-top: 10px;">
      {{ form.password.label_tag }}
      {{ form.password }}
    </div>

    <button type="submit" style="margin-top: 15px;">Войти</button>
    
    <!-- Скрытое поле, чтобы Django знал, куда вернуть пользователя, если он перешел по прямой ссылке -->
    <input type="hidden" name="next" value="{{ next }}" />
  </form>
{% endblock %}
