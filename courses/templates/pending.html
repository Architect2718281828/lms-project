<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ожидание подтверждения</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="text-center px-3">
        <div class="alert alert-warning shadow-sm" role="alert" style="max-width: 500px;">
            <h4 class="alert-heading mb-3">Аккаунт на проверке ⏳</h4>
            <p>Ваша учетная запись успешно создана, но доступ к материалам пока закрыт.</p>
            <hr>
            <p class="mb-0 text-muted">Администратор должен подтвердить ваш аккаунт и назначить группу. Пожалуйста, зайдите немного позже.</p>
        </div>

        <!-- Кнопка выхода (отправляем POST-запрос, как того требует Django) -->
        <form action="{% url 'logout' %}" method="post" class="mt-4">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-secondary">Выйти из аккаунта</button>
        </form>
    </div>

</body>
</html>
