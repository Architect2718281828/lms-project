<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
    <!-- Подключаем Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
        <h3 class="text-center mb-4">Вход в систему</h3>

        <form method="post">
            {% csrf_token %}
            <!-- Ошибки формы (если ввели неверный пароль) -->
            {% if form.errors %}
                <div class="alert alert-danger p-2" role="alert">
                    Неверный email или пароль.
                </div>
            {% endif %}

            <!-- Рендерим саму форму -->
            <div class="mb-3">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn btn-primary w-100">Войти</button>
        </form>

        <div class="text-center mt-3">
            <span class="text-muted">Нет аккаунта?</span>
            <a href="{% url 'register' %}" class="text-decoration-none">Зарегистрироваться</a>
        </div>
    </div>

</body>
</html>
